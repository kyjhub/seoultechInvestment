<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div style="text-align: center">
    <div>

        <h3>현재 추천 종목</h3>

        <div>
            <fieldset>
            <legend><b> 스윙 목적 </b></legend><br>
            종목명 : LG화학 <br><br>
            목표가 : 50,4000 <br><br>
            예상기간 : 3개월 이상 <br><br>
            </fieldset>
        </div>
        <br>
        <div>
            <fieldset>
                <legend><b> 10년 장투 목적 </b></legend><br>
                종목명 : 코스피200, 코스닥 150 <br><br>
            </fieldset>
        </div>
        <br>
        <button onclick="location.href='http://localhost:8080/performanceList'">이전 추천종목 성과</button>
</div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let tickerName;
        let tp;
        let period;

        axios({
            method: "get",
            url: "http://localhost:8080/stock/enroll",
            responseType: "application/json"
        }).then(function (response){
            let object = JSON.parse(response);
            tickerName = object.tickerName;
            tp = object.tp;
            period = object.tp;
        })

    </script>
</body>
</html>
