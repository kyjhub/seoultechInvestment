<!DOCTYPE html>
<!-- Thymeleaf를 사용하기 위해 xmlns:th 네임스페이스를 추가합니다. -->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - stInvestment</title>

    <!-- 1. 공통 CSS 파일 -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- 2. 로그인 페이지 전용 CSS 파일 -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="container">
    <h1>로그인</h1>

    <!--
      - action="/login": 이 form을 제출(submit)할 때 요청을 보낼 서버의 URL입니다.
      - method="post": 데이터를 서버로 전송하는 방식입니다.
      - th:object="${memberForm}": 서버의 컨트롤러에서 넘겨준 'memberForm'이라는 이름의 객체를 이 form과 연결합니다.
    -->
    <form action="/login" method="post" th:object="${memberForm}">
        <div class="input-group">
            <label th:for="studentId">학번</label>
            <!--
              - th:field="*{studentId}": input 태그를 memberForm 객체의 'studentId' 멤버 변수와 연결합니다.
                (id="studentId", name="studentId"가 자동으로 생성됩니다.)
              - maxlength="10": 입력 가능한 최대 글자 수를 10으로 제한합니다.
            -->
            <input type="text" th:field="*{stId}" name="stId" placeholder="학번 10자리를 입력하세요" maxlength="10">
        </div>

        <div class="input-group">
            <label th:for="password">비밀번호</label>
            <!-- th:field="*{password}": input 태그를 memberForm 객체의 'password' 멤버 변수와 연결합니다. -->
            <input type="password" th:field="*{password}" placeholder="비밀번호를 입력하세요">
        </div>

        <!-- type="submit"은 이 버튼을 눌렀을 때 form의 내용을 action에 지정된 주소로 전송하는 역할을 합니다. -->
        <button type="submit" class="button button-primary">로그인</button>
    </form>
</div>

<script>
    // 1. 현재 URL의 쿼리 스트링 부분(예: ?q=javascript&category=web)을 가져옵니다.
    const queryString = window.location.search;

    // 2. URLSearchParams 객체를 생성하여 쿼리 스트링을 파싱합니다.
    const urlParams = new URLSearchParams(queryString);

    // 3. get() 메서드를 사용하여 특정 파라미터의 값을 가져옵니다.
    // const error = urlParams.get('error');

    // 4. has() 메서드로 특정 파라미터의 존재 여부를 확인할 수 있습니다.
    if (urlParams.has('error')) {
        console.log('학번 또는 비밀번호가 잘못되었습니다.');
        alert("학번 또는 비밀번호가 잘못되었습니다.");
    }

    // 5. 모든 파라미터를 순회할 수도 있습니다.
    // for (const [key, value] of urlParams.entries()) {
    //     console.log(`${key}: ${value}`);
    // }
</script>
</body>
</html>
