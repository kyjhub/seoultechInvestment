<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html, charset=utf-8" />
    <title>Title</title>
</head>
<body>

<!--<form id="emailForm">-->
    <div>
        <label>이메일</label><br>
        <input type="email" id="emailInput" placeholder="이메일을 입력하세요">
    </div>
<!--</form>-->
<button id="emailButton">인증번호 받기</button>

<form id="authNumForm">
    <div>
        <label>인증번호</label><br>
        <input type="text" id="authNumInput" placeholder="인증번호를 입력하세요">
    </div>
</form>
<button id="authNumButton">인증하기</button>

<!--자바스크립트-->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    let inputEmail;
    let realAthNum;
    let inputAthNum;
    const config = {
        headers:{"Content-Type": 'application/json'}
    }

    function postEmailInText(event) { //email 입력값 변수에 저장
        event.preventDefault();
        inputEmail = document.getElementById("emailInput").value;
        const data = {
            email: inputEmail,
            athNum: null
        }
        axios.post("http://localhost:8080/email",
            JSON.stringify(data),
            config
        ).then(function (response) {
            realAthNum = response.data; //서버가 제공한 응답데이터
        });
    }

    function postResultOfAth(event) {
        event.preventDefault();
        inputAthNum = Number(document.getElementById("authNumInput").value);
        if (realAthNum === inputAthNum) {
            alert("이메일 인증을 성공했습니다. 회원가입을 해주세요.");
            location.href = "http://localhost:8080/signUp";
        }
        else{
            alert("인증번호가 틀렸습니다.");
        }
    }
    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('emailButton').addEventListener('click', postEmailInText);
        document.getElementById('authNumButton').addEventListener('click', postResultOfAth);
    });
</script>
</body>
</html>
