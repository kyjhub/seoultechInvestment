<!DOCTYPE html>
<!-- Thymeleaf와 Spring Security 네임스페이스 추가 -->
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투자 종목 등록 - stInvestment</title>

    <!-- 1. 공통 CSS 파일 -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- 2. 폼 페이지 공통 CSS 파일 (재사용) -->
    <link rel="stylesheet" href="/css/form-page.css">
</head>
<body>

<div class="container">
    <h1>투자 종목 등록</h1>

    <!--
      - th:object를 사용하여 폼과 서버에서 받은 newStock 객체를 연결합니다.
      - novalidate 속성은 브라우저의 기본 유효성 검사를 비활성화합니다.
    -->
    <form action="/admin/stock/enroll" method="post" th:object="${newStock}" novalidate>

        <!-- 종목명 입력 그룹 -->
        <div class="input-group">
            <label th:for="tickerName">종목명</label>
            <input type="text" th:field="*{tickerName}" placeholder="종목명을 입력하세요">
            <!-- ▼▼▼▼▼ Thymeleaf 에러 처리 로직 추가 ▼▼▼▼▼ -->
            <p class="error-message" th:if="${#fields.hasErrors('tickerName')}" th:errors="*{tickerName}">
                종목명 에러 메시지
            </p>
        </div>

        <!-- 최소 도달가 입력 그룹 -->
        <div class="input-group">
            <label th:for="tp">최소 도달가</label>
            <input type="text" th:field="*{tp}" placeholder="최소 도달 가격을 입력하세요"
                   onfocus="if(this.value == '0.0') this.value=''">
            <!-- ▼▼▼▼▼ Thymeleaf 에러 처리 로직 추가 ▼▼▼▼▼ -->
            <p class="error-message" th:if="${#fields.hasErrors('tp')}" th:errors="*{tp}">
                최소 도달가 에러 메시지
            </p>
        </div>

        <!-- 진입가 입력 그룹 -->
        <div class="input-group">
            <label th:for="entryPrice">진입가</label>
            <input type="text" th:field="*{entryPrice}" placeholder="진입 가격을 입력하세요"
                   onfocus="if(this.value == '0.0') this.value=''">
            <!-- ▼▼▼▼▼ Thymeleaf 에러 처리 로직 추가 ▼▼▼▼▼ -->
            <p class="error-message" th:if="${#fields.hasErrors('entryPrice')}" th:errors="*{entryPrice}">
                진입가 에러 메시지
            </p>
        </div>

        <!-- 등록 버튼 -->
        <button type="submit" class="button button-primary">등록</button>

    </form>
</div>

</body>
</html>
