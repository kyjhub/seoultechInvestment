<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>login</title>
</head>
<body>
<!--<h1>로그인</h1>-->
<form action="/login" name="loginMember" th:object="${memberForm}" method="post">
    <legend>회원가입</legend>
    <div>
        <p>학번이 로그인 아이디입니다.</p>
        <label th:for="studentId">학번</label>
        <input type="text" th:field="*{stId}" placeholder="학번"></input>
        <p th:if="${#fields.hasErrors('stId')}"
           th:errors="*{stId}">학번 입력하세요</p>
    </div>

    <div>
        <label th:for="password">비밀번호</label>
        <input type="text" th:field="*{password}" placeholder="비밀번호"></input>
        <p th:if="${#fields.hasErrors('password')}"
           th:errors="*{password}">비밀번호 입력하세요</p>
    </div>
</form>
</body>
</html>
