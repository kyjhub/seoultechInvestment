<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증</title>
<!--    자바스크립트 코드 연결 전에 Axios를 먼저 불러온다 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<!--    css파일 연결-->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <h1>이메일 인증</h1>
    <div class="input-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="서울과학기술대학교 이메일 주소를 입력하세요">
        <button id=emailBtn class="button button-secondary">인증번호 전송</button>
    </div>
    <div class="input-group">
        <label for="verification-code">인증번호</label>
        <input type="text" id="verification-code" placeholder="인증번호 6자리를 입력하세요">
    </div>
    <button id=authCodeBtn class="button button-primary">확인</button>
</div>

<!--자바스크립트 파일 연결-->
<script src="/js/postData.js"></script>
</body>
</html>
